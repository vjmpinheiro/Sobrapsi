# Copie para /etc/nginx/sites-available/sobrapsi
# ln -s /etc/nginx/sites-available/sobrapsi /etc/nginx/sites-enabled/
# nginx -t && systemctl reload nginx
# certbot --nginx -d sobrapsi.org.br -d www.sobrapsi.org.br

upstream sobrapsi_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name sobrapsi.org.br www.sobrapsi.org.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sobrapsi.org.br www.sobrapsi.org.br;

    # Certbot preenche estes caminhos após emitir o certificado
    ssl_certificate /etc/letsencrypt/live/sobrapsi.org.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sobrapsi.org.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 12M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://sobrapsi_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
